name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and export site
        run: npm run export

      - name: Publish static output to docs/
        run: |
          rm -rf docs
          mkdir docs
          cp -a out/. docs/

      - name: Create root redirect index.html
        run: |
          cat > docs/index.html <<'EOF'
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="refresh" content="0; url=/page/index.html" />
    <link rel="canonical" href="/page/index.html" />
    <title>Redirecting...</title>
  </head>
  <body>
    <p>Redirecting to <a href="/page/index.html">/page/index.html</a>.</p>
  </body>
</html>
EOF

      - name: Commit docs/ to main branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "No changes to docs/"
          else
            git commit -m "chore: update GitHub Pages docs [skip ci]"
            git push origin HEAD:refs/heads/${GITHUB_REF_NAME}
          fi
